<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- TT Icon — T1 black, T2 gold, white background variant -->
  <!-- White background -->
  <rect x="0" y="0" width="64" height="64" fill="#ffffff"/>
  <!-- Gold rounded border -->
  <rect x="1" y="1" width="62" height="62" fill="none" stroke="#c9a84c" stroke-width="2" rx="4"/>
  <!-- Structural beam horizontal -->
  <line x1="10" y1="17" x2="54" y2="17" stroke="#c9a84c" stroke-width="2.5"/>
  <!-- Column 1 at x=24, Column 2 at x=40 -->
  <line x1="24" y1="17" x2="24" y2="10" stroke="#c9a84c" stroke-width="2"/>
  <line x1="40" y1="17" x2="40" y2="10" stroke="#c9a84c" stroke-width="2"/>
  <!-- T1 black centered under column 1 (x=24) -->
  <text x="24" y="52" font-family="'Inter', Arial, sans-serif" font-weight="700" font-size="36" fill="#0a0a0a" text-anchor="middle">T</text>
  <!-- T2 gold centered under column 2 (x=40) -->
  <text x="40" y="52" font-family="'Inter', Arial, sans-serif" font-weight="700" font-size="36" fill="#c9a84c" text-anchor="middle">T</text>
</svg>
