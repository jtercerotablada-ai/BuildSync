<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 290 60" fill="none">
  <!-- Frame -->
  <rect x="0.75" y="0.75" width="54.5" height="54.5" stroke="#c9a84c" stroke-width="1.5" fill="none" rx="3"/>
  <!-- Crown beam -->
  <line x1="5" y1="14" x2="51" y2="14" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Crown columns (aligned with T centers at x=18 and x=38) -->
  <line x1="18" y1="14" x2="18" y2="7" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="38" y1="14" x2="38" y2="7" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round"/>
  <!-- T1 white -->
  <text x="18" y="47" font-family="'Inter', Arial, sans-serif" font-weight="700" font-size="30" fill="#ffffff" text-anchor="middle">T</text>
  <!-- T2 gold -->
  <text x="38" y="47" font-family="'Inter', Arial, sans-serif" font-weight="700" font-size="30" fill="#c9a84c" text-anchor="middle">T</text>
  <!-- Company name -->
  <text x="68" y="20" font-family="'Inter', Arial, sans-serif" font-weight="700" font-size="13" fill="#ffffff" letter-spacing="2.5">TERCERO TABLADA</text>
  <text x="68" y="36" font-family="'Inter', Arial, sans-serif" font-weight="400" font-size="6.5" fill="#999999" letter-spacing="1.2">CIVIL &amp; STRUCTURAL ENGINEERING INC.</text>
  <text x="68" y="50" font-family="'Inter', Arial, sans-serif" font-weight="600" font-size="6" fill="#c9a84c" letter-spacing="1.5">REGISTERED P.E.</text>
</svg>
